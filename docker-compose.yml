services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-write_me}
      POSTGRES_USER: ${POSTGRES_USER:-write_me}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-write_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-write_me} -d ${POSTGRES_DB:-write_me}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://write_me:write_me@db:5432/write_me?sslmode=disable}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      API_PUBLIC_ORIGIN: ${API_PUBLIC_ORIGIN:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LLM_BRIDGE_BASE_URL: ${LLM_BRIDGE_BASE_URL:-http://host.docker.internal:43110}
      LLM_BRIDGE_TOKEN: ${LLM_BRIDGE_TOKEN}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-CODEX_CLI}
      CODEX_MODEL_ALIAS: ${CODEX_MODEL_ALIAS:-write-me-codex}
      GEMINI_MODEL_ALIAS: ${GEMINI_MODEL_ALIAS:-write-me-gemini}
      CLAUDE_MODEL_ALIAS: ${CLAUDE_MODEL_ALIAS:-write-me-claude}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_APP_URL: ${APP_ORIGIN:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${API_PUBLIC_ORIGIN:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
